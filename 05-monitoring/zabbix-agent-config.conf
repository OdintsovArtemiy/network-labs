# ============================================
# Zabbix Agent Configuration File
# Версия: Zabbix 6.0 LTS
# Хост: Телеком-коммутатор Cisco
# ============================================

# ============================================
# 1. Основные настройки подключения
# ============================================

# Адрес Zabbix сервера
Server=10.10.10.100,10.10.10.101

# Активный режим (agent тянет конфиг с сервера)
ServerActive=10.10.10.100

# Имя хоста в Zabbix (должно совпадать с именем в интерфейсе)
Hostname=cisco-2960-datacenter-01

# ============================================
# 2. Форматы метаданных и логов
# ============================================

# Формат вывода метаданных (JSON для удобной обработки)
HostMetadataItem=system.uname

# Логирование
LogFile=/var/log/zabbix/zabbix_agentd.log
LogFileSize=50
DebugLevel=3

# ============================================
# 3. Таймауты и переподключения
# ============================================

# Таймаут выполнения проверки (сек)
Timeout=10

# Переподключение при потере связи
ConnectTimeout=5
KeepAlive=30

# ============================================
# 4. Настройки для SNMP мониторинга
# ============================================

# Пользовательские параметры для SNMP запросов
UserParameter=snmp.cpu.load,snmpget -v3 -u zabbix-user -l authPriv -a SHA -A ZabbixPass2024! -x AES -X ZabbixCrypt2024! localhost .1.3.6.1.4.1.9.9.109.1.1.1.1.5.1

UserParameter=snmp.memory.used,snmpget -v3 -u zabbix-user -l authPriv -a SHA -A ZabbixPass2024! -x AES -X ZabbixCrypt2024! localhost .1.3.6.1.4.1.9.9.48.1.1.1.5.1

UserParameter=snmp.temperature,snmpget -v3 -u zabbix-user -l authPriv -a SHA -A ZabbixPass2024! -x AES -X ZabbixCrypt2024! localhost .1.3.6.1.4.1.9.9.91.1.1.1.1.4.1

# ============================================
# 5. Мониторинг сетевых интерфейсов
# ============================================

# Статус всех интерфейсов
UserParameter=interface.status[*],snmpwalk -v3 -u zabbix-user -l authPriv -a SHA -A ZabbixPass2024! -x AES -X ZabbixCrypt2024! localhost .1.3.6.1.2.1.2.2.1.8.$1

# Ошибки на интерфейсе
UserParameter=interface.errors.in[*],snmpget -v3 -u zabbix-user -l authPriv -a SHA -A ZabbixPass2024! -x AES -X ZabbixCrypt2024! localhost .1.3.6.1.2.1.2.2.1.14.$1

UserParameter=interface.errors.out[*],snmpget -v3 -u zabbix-user -l authPriv -a SHA -A ZabbixPass2024! -x AES -X ZabbixCrypt2024! localhost .1.3.6.1.2.1.2.2.1.20.$1

# ============================================
# 6. Мониторинг VLAN и MAC таблиц
# ============================================

# Количество активных VLAN
UserParameter=vlan.count,snmpwalk -v3 -u zabbix-user -l authPriv -a SHA -A ZabbixPass2024! -x AES -X ZabbixCrypt2024! localhost .1.3.6.1.4.1.9.9.68.1.2.2.1.2 | wc -l

# Количество MAC-адресов в таблице
UserParameter=mac.count,snmpwalk -v3 -u zabbix-user -l authPriv -a SHA -A ZabbixPass2024! -x AES -X ZabbixCrypt2024! localhost .1.3.6.1.2.1.17.7.1.2.2.1.2 | wc -l

# ============================================
# 7. Мониторинг безопасности
# ============================================

# Неудачные попытки входа через консоль
UserParameter=security.failed.logins,grep "Failed password" /var/log/auth.log | wc -l

# Изменения в конфигурации (контроль целостности)
UserParameter=config.md5,md5sum /etc/zabbix/zabbix_agentd.conf | awk '{print $1}'
